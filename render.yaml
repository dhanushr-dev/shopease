# ========================
# ShopEase — Render Blueprint (Single Service Deploy)
# ========================
# ONE URL, ONE service, FREE forever
#
# Deploy: https://dashboard.render.com → New → Blueprint → Connect Repo
# Or just deploy manually using the steps in the walkthrough

databases:
  - name: shopease-db
    plan: free
    databaseName: shopease
    user: shopease

services:
  - type: web
    name: shopease
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api-docs
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: shopease-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: shopease-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: shopease-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: shopease-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: shopease-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: CLOUDINARY_CLOUD_NAME
        value: "placeholder"
      - key: CLOUDINARY_API_KEY
        value: "placeholder"
      - key: CLOUDINARY_API_SECRET
        value: "placeholder"
      - key: MAIL_USERNAME
        value: "placeholder@gmail.com"
      - key: MAIL_PASSWORD
        value: "placeholder"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
