# ========================
# ShopEase — Render Blueprint (Neon PostgreSQL)
# ========================
# ONE URL, ONE service
#
# Database: Neon Free Tier (external, not managed by Render)
# Deploy:   Render Dashboard → New → Blueprint → Connect Repo
#           Then set DB_* env vars from your Neon dashboard

services:
  - type: web
    name: shopease
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api-docs
    envVars:
      # ── Neon PostgreSQL (set these from your Neon dashboard) ──
      - key: DB_HOST
        sync: false  # Set manually in Render dashboard
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false  # Set manually in Render dashboard
      - key: DB_USERNAME
        sync: false  # Set manually in Render dashboard
      - key: DB_PASSWORD
        sync: false  # Set manually in Render dashboard
      # ── App Config ──
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: CLOUDINARY_CLOUD_NAME
        value: "placeholder"
      - key: CLOUDINARY_API_KEY
        value: "placeholder"
      - key: CLOUDINARY_API_SECRET
        value: "placeholder"
      - key: MAIL_USERNAME
        value: "placeholder@gmail.com"
      - key: MAIL_PASSWORD
        value: "placeholder"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: RAZORPAY_KEY_ID
        value: "rzp_test_SkaF96nrBA36yp"
      - key: RAZORPAY_KEY_SECRET
        value: "KvKQ8aC4zBAxfuDUCG3Cu562"
