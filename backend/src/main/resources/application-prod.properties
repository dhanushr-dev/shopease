# ========================
# ShopEase — Production Configuration (Render + PostgreSQL)
# ========================
# Activated via SPRING_PROFILES_ACTIVE=prod

# ========================
# PostgreSQL Database (Render Free Tier)
# ========================
# Render provides DATABASE_URL as: postgres://user:pass@host:port/dbname
# Spring Boot needs:              jdbc:postgresql://host:port/dbname
# We use individual DB_* vars from Render's fromDatabase references
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate — PostgreSQL
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# ========================
# Logging — reduce noise in production
# ========================
logging.level.com.easeshop=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
