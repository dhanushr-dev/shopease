# ========================
# ShopEase — Production Configuration (Neon PostgreSQL)
# ========================
# Activated via SPRING_PROFILES_ACTIVE=prod

# ========================
# PostgreSQL Database (Neon Free Tier)
# ========================
# Neon connection string: postgresql://user:pass@host/dbname?sslmode=require
# We use individual DB_* env vars set in Render dashboard
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require&channelBinding=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool tuning for serverless Neon (scales to zero)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000

# ========================
# JPA / Hibernate — PostgreSQL
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# ========================
# Logging — reduce noise in production
# ========================
logging.level.com.easeshop=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
